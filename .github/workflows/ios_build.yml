name: iOS Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-14
    
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Xcode Project
        run: |
          brew install xcodegen
          cd iosApp
          xcodegen generate
          
          ln -sf ../gradlew gradlew
          chmod +x ../gradlew

      - name: Build Kotlin Module (Manual)
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}
        run: |
          chmod +x gradlew
          # On compile le framework manuellement avec capture de log
          # On génère Dummy pour CocoaPods, puis le vrai framework
          ./gradlew :shared:generateDummyFramework --no-daemon
          if ! ./gradlew :shared:podPublishReleaseFramework --info --no-daemon > build_log.txt 2>&1; then
              echo "------------------------------------------"
              echo "ERREUR DÉTAILLÉE DE COMPILATION KOTLIN :"
              echo "------------------------------------------"
              cat build_log.txt
              exit 1
          fi

      - name: Install CocoaPods
        run: |
          cd iosApp
          pod install --repo-update
          
          # Nettoyage des flags Xcode 16
          find Pods -name "*.xcconfig" -type f -exec sed -i '' 's/-G //g' {} +
          find Pods -name "*.xcconfig" -type f -exec sed -i '' 's/ -G//g' {} +
          find Pods -name "*.xcconfig" -type f -exec sed -i '' 's/--serialize-diagnostics//g' {} +

      - name: Build iOS App (Xcode)
        run: |
          # Build final. Xcode utilisera le framework déjà compilé par Gradle
          xcodebuild build \
            -workspace iosApp/iosApp.xcworkspace \
            -scheme iosApp \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_USER_SCRIPT_SANDBOXING=NO

      - name: Show logs on failure
        if: failure()
        run: |
          echo "Dumping build logs for debugging..."
          find ~/Library/Developer/Xcode/DerivedData -name "*.log" -exec cat {} \; || true

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-build
          path: ~/Library/Developer/Xcode/DerivedData/**/Build/Products/Release-iphoneos/*.app
