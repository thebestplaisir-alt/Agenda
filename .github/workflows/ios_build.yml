name: iOS Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-15
    
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Cache Konan dependencies
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-konan-

      - name: Generate Xcode Project
        run: |
          brew install xcodegen
          cd iosApp
          xcodegen generate
          
      - name: Build Kotlin Module (Manual)
        run: |
          chmod +x gradlew
          # On limite la mémoire pour éviter les crashs sur le runner GitHub
          export GRADLE_OPTS="-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.workers.max=2"
          
          # On génère le framework factice
          ./gradlew :shared:generateDummyFramework --no-daemon
          
          # On compile le framework pour iOS
          ./gradlew :shared:linkReleaseFrameworkIosArm64 --no-daemon

      - name: Install CocoaPods
        run: |
          cd iosApp
          pod install --repo-update
          
          # Nettoyage des flags Xcode 16
          find Pods -name "*.xcconfig" -type f -exec sed -i '' 's/-G //g' {} +
          find Pods -name "*.xcconfig" -type f -exec sed -i '' 's/ -G//g' {} +
          find Pods -name "*.xcconfig" -type f -exec sed -i '' 's/--serialize-diagnostics//g' {} +

      - name: Build iOS App (Xcode)
        run: |
          # Build final. Xcode utilisera le framework déjà compilé par Gradle
          xcodebuild build \
            -workspace iosApp/iosApp.xcworkspace \
            -scheme iosApp \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_USER_SCRIPT_SANDBOXING=NO

      - name: Show logs on failure
        if: failure()
        run: |
          echo "Dumping build logs for debugging..."
          find ~/Library/Developer/Xcode/DerivedData -name "*.log" -exec cat {} \; || true

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-build
          path: ~/Library/Developer/Xcode/DerivedData/**/Build/Products/Release-iphoneos/*.app
