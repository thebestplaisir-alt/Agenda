name: iOS Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-15
    
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Xcode Project
        run: |
          brew install xcodegen
          cd iosApp
          xcodegen generate
          
          # Fix pour Xcode 16 : Lien vers gradlew et environnement Java
          ln -sf ../gradlew gradlew
          chmod +x ../gradlew
          echo "export JAVA_HOME=$JAVA_HOME" > .xcode.env.local
          echo "export PATH=$JAVA_HOME/bin:$PATH" >> .xcode.env.local

      - name: Install CocoaPods
        run: |
          # Pré-compilation Kotlin pour préparer les en-têtes
          ./gradlew :shared:generateDummyFramework --no-daemon
          cd iosApp
          pod install
          
          # Nettoyage des flags de compilation incompatibles
          find Pods -name "*.xcconfig" -type f -exec sed -i '' 's/-G //g' {} +
          find Pods -name "*.xcconfig" -type f -exec sed -i '' 's/ -G//g' {} +
          find Pods -name "*.xcconfig" -type f -exec sed -i '' 's/--serialize-diagnostics//g' {} +

      - name: Build Shared Module
        run: |
          # On compile le module Kotlin séparément pour voir les erreurs clairement
          ./gradlew :shared:assembleRelease --no-daemon

      - name: Build iOS App (Xcode)
        run: |
          xcodebuild build \
            -workspace iosApp/iosApp.xcworkspace \
            -scheme iosApp \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_USER_SCRIPT_SANDBOXING=NO

      - name: Show logs on failure
        if: failure()
        run: |
          echo "Dumping build logs for debugging..."
          find ~/Library/Developer/Xcode/DerivedData -name "*.log" -exec cat {} \; || true

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-build
          path: ~/Library/Developer/Xcode/DerivedData/**/Build/Products/Release-iphoneos/*.app
