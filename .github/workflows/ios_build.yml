name: iOS Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-15
    
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Xcode Project
        run: |
          brew install xcodegen
          cd iosApp
          xcodegen generate
          
          ln -sf ../gradlew gradlew
          chmod +x ../gradlew

      - name: Prepare Kotlin Framework for CocoaPods
        run: |
          chmod +x gradlew
          # 1. On génère le framework factice pour que 'pod install' accepte de s'exécuter
          ./gradlew :shared:generateDummyFramework --no-daemon
          
          # 2. On génère le VRAI framework pour iOS Arm64 manuellement
          ./gradlew :shared:podPublishReleaseFramework --no-daemon

      - name: Install CocoaPods
        run: |
          cd iosApp
          # On installe les Pods. Le script phase 'Build shared' sera ignoré (grâce au Podfile)
          pod install --repo-update
          
          # Nettoyage des flags de compilation incompatibles Xcode 16
          find Pods -name "*.xcconfig" -type f -exec sed -i '' 's/-G //g' {} +
          find Pods -name "*.xcconfig" -type f -exec sed -i '' 's/ -G//g' {} +
          find Pods -name "*.xcconfig" -type f -exec sed -i '' 's/--serialize-diagnostics//g' {} +

      - name: Build iOS App (Xcode)
        run: |
          # Build final. Xcode utilisera le framework déjà compilé par Gradle
          xcodebuild build \
            -workspace iosApp/iosApp.xcworkspace \
            -scheme iosApp \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_USER_SCRIPT_SANDBOXING=NO

      - name: Show logs on failure
        if: failure()
        run: |
          echo "Dumping build logs for debugging..."
          find ~/Library/Developer/Xcode/DerivedData -name "*.log" -exec cat {} \; || true

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-build
          path: ~/Library/Developer/Xcode/DerivedData/**/Build/Products/Release-iphoneos/*.app
