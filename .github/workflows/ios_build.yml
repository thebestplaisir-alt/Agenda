name: iOS Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-15
    
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Xcode Project
        run: |
          brew install xcodegen
          cd iosApp
          # Nettoyage profond
          rm -rf iosApp.xcodeproj iosApp.xcworkspace
          xcodegen generate

      - name: Install CocoaPods
        run: |
          chmod +x gradlew
          ./gradlew :shared:generateDummyFramework --no-daemon
          cd iosApp
          pod install

      - name: Clean unsupported flags from Pods
        run: |
          cd iosApp
          echo "Cleaning -G flag and serialize-diagnostics from Pods configurations..."
          find Pods -name "*.xcconfig" -type f -exec sed -i '' 's/-G //g' {} +
          find Pods -name "*.xcconfig" -type f -exec sed -i '' 's/ -G//g' {} +
          find Pods -name "*.xcconfig" -type f -exec sed -i '' 's/--serialize-diagnostics//g' {} +
          # Verification
          echo "Verification of remaining -G flags:"
          grep -r -- '-G' Pods || echo "No more -G flags found."
          
      - name: List Schemes
        run: |
          cd iosApp
          xcodebuild -workspace iosApp.xcworkspace -list

      - name: Build iOS App
        run: |
          # Build final avec Xcode 16 (macos-15)
          xcodebuild build \
            -workspace iosApp/iosApp.xcworkspace \
            -scheme iosApp \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -allowProvisioningUpdates \
            COMPILER_INDEX_STORE_ENABLE=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-build
          path: ~/Library/Developer/Xcode/DerivedData/**/Build/Products/Release-iphoneos/*.app
