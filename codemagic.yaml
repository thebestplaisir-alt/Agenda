workflows:
  android-workflow:
    name: Agenda Android Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - google_play
      vars:
        PACKAGE_NAME: "com.inchios.agendapadel"
      java: 17
    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
      - name: Build Android App Bundle (Phone & Wear)
        script: |
          ./gradlew :app:bundleRelease :wear:bundleRelease --no-daemon
    artifacts:
      - app/build/outputs/bundle/release/*.aab
      - wear/build/outputs/bundle/release/*.aab
    publishing:
      email:
        recipients:
          - inchiostro.stephane@hotmail.be
        notify:
          success: true
          failure: true

  ios-workflow:
    name: Agenda iOS Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - google_play
      vars:
        XCODE_WORKSPACE: "iosApp/iosApp.xcworkspace"
        XCODE_SCHEME: "iosApp"
      java: 17
      xcode: 16.0
      cocoapods: default
    scripts:
      - name: Force Java 17 System and Gradle
        script: |
          # Trouver le chemin de Java 17 sur le Mac Codemagic
          JAVA_PATH=$(/usr/libexec/java_home -v 17)
          echo "JAVA_HOME=$JAVA_PATH" >> $CM_ENV
          echo "PATH=$JAVA_PATH/bin:$PATH" >> $CM_ENV
          # Forcer Kotlin à utiliser ce Java spécifiquement pour le pont iOS
          echo "kotlin.native.cocoapods.java.home=$JAVA_PATH" >> gradle.properties
          echo "org.gradle.java.home=$JAVA_PATH" >> gradle.properties
      - name: Clean Build Artifacts
        script: |
          rm -rf ~/.konan
          rm -rf shared/build
          rm -rf iosApp/Pods
          rm -rf iosApp/iosApp.xcworkspace
      - name: Generate Xcode Project
        script: |
          brew install xcodegen
          cd iosApp
          xcodegen generate
      - name: Install CocoaPods and Kotlin Framework
        script: |
          export JAVA_HOME=$(/usr/libexec/java_home -v 17)
          # Générer le lien entre Kotlin et CocoaPods
          ./gradlew :shared:podspec :shared:generateDummyFramework --no-daemon
          cd iosApp
          pod install
      - name: Build iOS App
        script: |
          export JAVA_HOME=$(/usr/libexec/java_home -v 17)
          export SDK_NAME="iphoneos"
          export CONFIGURATION="Release"
          export ARCHS="arm64"
          xcodebuild build \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - iosApp/build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - inchiostro.stephane@hotmail.be
        notify:
          success: true
          failure: true
