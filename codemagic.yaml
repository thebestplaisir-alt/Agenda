workflows:
  android-workflow:
    name: Agenda Android Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - google_play
      vars:
        PACKAGE_NAME: "com.inchios.agendapadel"
      java: 17
    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
      - name: Build Android App Bundle (Phone & Wear)
        script: |
          ./gradlew :app:bundleRelease :wear:bundleRelease --no-daemon
    artifacts:
      - app/build/outputs/bundle/release/*.aab
      - wear/build/outputs/bundle/release/*.aab
    publishing:
      email:
        recipients:
          - inchiostro.stephane@hotmail.be
        notify:
          success: true
          failure: true

  ios-test:
    name: Test Minimal Kotlin iOS
    instance_type: mac_pro
    max_build_duration: 15
    environment:
      java: 17
      xcode: 16.2
    scripts:
      - name: Build Kotlin Framework
        script: |
          chmod +x gradlew
          export JAVA_HOME=$(/usr/libexec/java_home -v 17)
          
          # Nettoyage total
          rm -rf ~/.konan
          rm -rf ~/.gradle/caches
          rm -rf ~/Library/Caches/CocoaPods
          pod cache clean --all
          
          # On tente la compilation avec capture de log
          if ! ./gradlew :shared:podPublishReleaseFramework --info --no-daemon > build_log.txt 2>&1; then
              echo "------------------------------------------"
              echo "VRAIE ERREUR DU LINKER CI-DESSOUS :"
              echo "------------------------------------------"
              # On cherche spécifiquement les erreurs de type 'ld:' ou 'error:'
              grep -C 5 "ld:" build_log.txt || grep -B 20 "FAILED" build_log.txt || tail -n 100 build_log.txt
              echo "------------------------------------------"
              exit 1
          fi

  ios-workflow:
    name: Agenda iOS Workflow
    max_build_duration: 60
    instance_type: mac_pro
    environment:
      groups:
        - google_play
      vars:
        XCODE_WORKSPACE: "iosApp/iosApp.xcworkspace"
        XCODE_SCHEME: "iosApp"
      java: 17
      xcode: 16.2
      cocoapods: default
    scripts:
      - name: Setup Environment
        script: |
          JAVA_PATH=$(/usr/libexec/java_home -v 17)
          echo "JAVA_HOME=$JAVA_PATH" >> $CM_ENV
          echo "PATH=$JAVA_PATH/bin:$PATH" >> $CM_ENV
          sudo ln -sf $JAVA_PATH/bin/java /usr/local/bin/java
          java -version
      - name: Clean Environment
        script: |
          chmod +x gradlew
          ./gradlew clean --no-daemon
          rm -rf ~/.konan
          rm -rf shared/build
      - name: Generate Xcode Project
        script: |
          brew install xcodegen
          cd iosApp
          xcodegen generate
          
          # 1. Création d'un lien symbolique pour gradlew (Fix crucial pour Xcode 16)
          # Cela permet au script de Kotlin de trouver gradlew même s'il cherche ./gradlew
          ln -sf ../gradlew gradlew
          chmod +x ../gradlew
          
          # 2. Configuration de l'environnement pour Xcode
          JAVA_PATH=$(/usr/libexec/java_home -v 17)
          echo "export JAVA_HOME=$JAVA_PATH" > .xcode.env.local
          echo "export PATH=\$JAVA_HOME/bin:\$PATH" >> .xcode.env.local
          
          echo "Environnement Xcode configuré et lien gradlew créé."
      - name: Install CocoaPods
        script: |
          chmod +x gradlew
          export JAVA_HOME=$(/usr/libexec/java_home -v 17)
          export PATH=$JAVA_HOME/bin:$PATH
          
          # Génère le framework factice requis pour le podspec
          ./gradlew :shared:generateDummyFramework --no-daemon
          
          # Force la régénération du podspec
          ./gradlew :shared:podspec --no-daemon
          
          cd iosApp
          pod install --repo-update
          
          # Nettoyage sécurisé des flags -G et serialize-diagnostics (compatible macOS sed)
          echo "Cleaning incompatible flags in Pods..."
          find Pods -name "*.xcconfig" -type f -exec sed -i '' 's/-G //g' {} +
          find Pods -name "*.xcconfig" -type f -exec sed -i '' 's/ -G//g' {} +
          find Pods -name "*.xcconfig" -type f -exec sed -i '' 's/--serialize-diagnostics//g' {} +
          grep -r -- '-G' Pods | grep -v "BoringSSL-GRPC" || echo "Plus de flag -G isolé trouvé."
      - name: Build iOS App
        script: |
          export JAVA_HOME=$(/usr/libexec/java_home -v 17)
          export PATH=$JAVA_HOME/bin:$PATH
          chmod +x gradlew
          
          # Nettoyage DerivedData pour éviter les caches corrompus
          rm -rf ~/Library/Developer/Xcode/DerivedData
          
          # Pré-compilation Kotlin
          ./gradlew :shared:assembleRelease --no-daemon
          
          # Build Xcode
          xcodebuild build \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_USER_SCRIPT_SANDBOXING=NO
    artifacts:
      - iosApp/build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - inchiostro.stephane@hotmail.be
        notify:
          success: true
          failure: true
