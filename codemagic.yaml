workflows:
  android-workflow:
    name: Agenda Android Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - google_play
      vars:
        PACKAGE_NAME: "com.inchios.agendapadel"
      java: 17
    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
      - name: Build Android App Bundle (Phone & Wear)
        script: |
          ./gradlew :app:bundleRelease :wear:bundleRelease --no-daemon
    artifacts:
      - app/build/outputs/bundle/release/*.aab
      - wear/build/outputs/bundle/release/*.aab
    publishing:
      email:
        recipients:
          - inchiostro.stephane@hotmail.be
        notify:
          success: true
          failure: true

  ios-workflow:
    name: Agenda iOS Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - google_play
      vars:
        XCODE_WORKSPACE: "iosApp/iosApp.xcworkspace"
        XCODE_SCHEME: "iosApp"
      java: 17
      xcode: 16.0
      cocoapods: default
    scripts:
      - name: Force Java 17 System-wide
        script: |
          # Commande officielle Codemagic pour forcer Java
          set_java_home 17
      - name: Clean Kotlin Native cache
        script: |
          rm -rf ~/.konan
      - name: Generate Xcode Project
        script: |
          brew install xcodegen
          cd iosApp
          xcodegen generate
      - name: Install CocoaPods
        script: |
          # Générer le dummy framework pour débloquer pod install
          ./gradlew :shared:generateDummyFramework --no-daemon
          cd iosApp
          pod install
      - name: Build iOS App
        script: |
          xcodebuild build \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - iosApp/build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - inchiostro.stephane@hotmail.be
        notify:
          success: true
          failure: true
