workflows:
  android-workflow:
    name: Agenda Android Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - google_play
      vars:
        PACKAGE_NAME: "com.inchios.agendapadel"
      java: 17
    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
      - name: Build Android App Bundle (Phone & Wear)
        script: |
          ./gradlew :app:bundleRelease :wear:bundleRelease
    artifacts:
      - app/build/outputs/bundle/release/*.aab
      - wear/build/outputs/bundle/release/*.aab
    publishing:
      email:
        recipients:
          - inchiostro.stephane@hotmail.be
        notify:
          success: true
          failure: true

  ios-workflow:
    name: Agenda iOS Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - google_play
      vars:
        XCODE_WORKSPACE: "iosApp/iosApp.xcworkspace"
        XCODE_SCHEME: "iosApp"
      java: 17
      xcode: 16.0
      cocoapods: default
    scripts:
      - name: Setup Environment
        script: |
          # Force Java 17
          echo "export JAVA_HOME=$(/usr/libexec/java_home -v 17)" >> $CM_ENV
          echo "export PATH=$(/usr/libexec/java_home -v 17)/bin:$PATH" >> $CM_ENV
      - name: Clean and Install Tools
        script: |
          rm -rf ~/.konan
          brew install xcodegen
      - name: Generate Xcode Project
        script: |
          cd iosApp
          xcodegen generate
      - name: Build Kotlin Framework
        script: |
          export JAVA_HOME=$(/usr/libexec/java_home -v 17)
          ./gradlew :shared:assembleSharedReleaseFramework
      - name: Install CocoaPods
        script: |
          cd iosApp
          pod install
      - name: Build iOS App
        script: |
          # Créer le dossier attendu par XcodeGen s'il n'existe pas
          mkdir -p shared/build/fat-framework/release
          cp -R shared/build/bin/iosArm64/releaseFramework/shared.framework shared/build/fat-framework/release/

          export SDK_NAME="iphoneos"
          export CONFIGURATION="Release"
          export ARCHS="arm64"
          xcodebuild build \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - iosApp/build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - inchiostro.stephane@hotmail.be
        notify:
          success: true
          failure: true
