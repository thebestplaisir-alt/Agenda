name: iosApp
options:
  bundleIdPrefix: com.inchios
targets:
  iosApp:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources: [iosApp]
    settings:
      base:
        INFOPLIST_FILE: iosApp/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.inchios.agenda.ios
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: $(inherited) @executable_path/Frameworks
        SWIFT_VERSION: 5.0
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        # On ajoute tous les chemins possibles pour être sûr
        FRAMEWORK_SEARCH_PATHS: 
          - $(inherited)
          - $(SRCROOT)/../shared/build/bin/iosArm64/releaseFramework
          - $(SRCROOT)/../shared/build/cocoapods/framework
    dependencies:
      - framework: ../shared/build/bin/iosArm64/releaseFramework/shared.framework
        embed: true
