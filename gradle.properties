# Configuration CI Ultra-stable
org.gradle.jvmargs=-Xmx6144m -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8
org.gradle.daemon=false
org.gradle.parallel=false
org.gradle.workers.max=1
org.gradle.configuration-cache=false

# Fix Xcode 16 global (C-Interop & Clang)
# Ces propriétés sont injectées directement dans le compilateur Kotlin Native
kotlin.native.apple_sdk.allow.modular.headers=true
kotlin.native.cacheKind=none
kotlin.daemon.jvmargs=-Xmx4096m
kotlin.native.backend.threads=1

# Forcer les flags Clang au niveau des propriétés Konan
konan.properties.clangFlags.apple_sdk=-fmodules -fbuiltin -D_DARWIN_C_SOURCE
konan.properties.clangFlags.ios_arm64=-fmodules -fbuiltin -D_DARWIN_C_SOURCE

# AndroidX
android.useAndroidX=true
android.enableJetifier=true
android.suppressUnsupportedCompileSdk=35
