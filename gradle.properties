# Configuration CI Ultra-stable (8Go RAM max)
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8
org.gradle.daemon=false
org.gradle.parallel=false
org.gradle.workers.max=1
org.gradle.configuration-cache=false

# Stabilitķ Kotlin/Native CI
kotlin.native.cacheKind=none
kotlin.daemon.jvmargs=-Xmx2048m
kotlin.native.ignoreDisabledTargets=true
kotlin.native.linkTimeOptimization=false
kotlin.native.linkTimeOptimization.generic=false


# Compatibilitķ Xcode 16
apple.tests.runProcessSynchronously=true
kotlin.mpp.androidGradlePluginCompatibility.nowarn=true
# Force le chargement correct des headers systĶme
kotlin.native.platform.libs.dir.iphoneos=iphoneos

# AndroidX obligatoire pour les dķpendances rķcentes
android.useAndroidX=true
android.enableJetifier=true
android.suppressUnsupportedCompileSdk=35
