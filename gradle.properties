# Mémoire JVM boostée pour Firebase iOS
org.gradle.jvmargs=-Xmx6144m -Xss4m -Dfile.encoding=UTF-8

# Forcer le chemin Java 17 pour les serveurs Mac
org.gradle.java.home=/Library/Java/JavaVirtualMachines/zulu-17.jdk/Contents/Home

# Stabilité Kotlin/Native
kotlin.native.cacheKind=none
kotlin.daemon.jvmargs=-Xmx4096m -Xss4m
kotlin.native.distribution.downloadFromMaven=true
kotlin.native.ignoreDisabledTargets=true


# Compatibilité Xcode 16
apple.tests.runProcessSynchronously=true
kotlin.mpp.androidGradlePluginCompatibility.nowarn=true

# AndroidX support
android.useAndroidX=true
android.enableJetifier=true
android.suppressUnsupportedCompileSdk=35

