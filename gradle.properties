# Configuration CI Ultra-stable (6Go RAM pour Gradle)
org.gradle.jvmargs=-Xmx6144m -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8
org.gradle.daemon=false
org.gradle.parallel=false
org.gradle.workers.max=1
org.gradle.configuration-cache=false

# Stabilité Kotlin/Native CI
kotlin.native.cacheKind=none
kotlin.daemon.jvmargs=-Xmx4096m
kotlin.native.ignoreDisabledTargets=true
# Un seul thread pour sauver la RAM
kotlin.native.backend.threads=1

# Compatibilité Xcode 16
apple.tests.runProcessSynchronously=true
kotlin.mpp.androidGradlePluginCompatibility.nowarn=true
kotlin.native.apple.sdk.allow.modular.headers=true

# AndroidX
android.useAndroidX=true
android.enableJetifier=true
android.suppressUnsupportedCompileSdk=35
